---
- name: Install Nginx
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: yes

- name: Ensure nginx is enabled and running
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: yes

- name: Create SSL directory
  ansible.builtin.file:
    path: /etc/nginx/ssl/
    state: directory
    mode: '0755'

- name: Determine relay domain for this host
  ansible.builtin.set_fact:
    relay_domain: "{{ item.domain }}"
  loop: "{{ relay_infrastructure }}"
  when: item.ip == ansible_host

- name: Fail if relay domain was not found
  ansible.builtin.fail:
    msg: "No matching relay domain found for ansible_host={{ ansible_host }}"
  when: relay_domain is not defined

- name: Copy relay certificate
  ansible.builtin.copy:
    src: "certs/{{ relay_domain }}.crt"
    dest: "/etc/nginx/ssl/relay.crt"
    mode: '0644'
  notify: Restart Nginx

- name: Copy relay private key
  ansible.builtin.copy:
    src: "certs/{{ relay_domain }}.key"
    dest: "/etc/nginx/ssl/relay.key"
    mode: '0600'
  notify: Restart Nginx

- name: Deploy nginx config
  ansible.builtin.template:
    src: relay_nginx.conf.j2
    dest: /etc/nginx/sites-enabled/default
    mode: '0644'
  notify: Restart Nginx